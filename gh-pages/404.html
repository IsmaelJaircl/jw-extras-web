<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JW Extras — Enlace no encontrado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(160deg, #0a0a1a 0%, #1a1035 40%, #0d1b2a 100%);
            color: #fff; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        body::before { content: ''; position: fixed; width: 300px; height: 300px; border-radius: 50%; filter: blur(80px); opacity: 0.25; background: radial-gradient(circle, #7c3aed, transparent); top: -100px; right: -80px; animation: float 8s ease-in-out infinite; z-index: 0; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        .card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.06); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
            padding: 48px 32px 40px; max-width: 400px; width: 100%; text-align: center;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4); animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes cardIn { from { opacity:0; transform: translateY(40px); } }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 28px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 14px 28px; border-radius: 14px;
            background: linear-gradient(135deg, #7c3aed, #6b21a8); color: #fff;
            font-family: inherit; font-size: 15px; font-weight: 700;
            text-decoration: none; transition: all 0.2s;
            box-shadow: 0 8px 24px rgba(107,33,168,0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(107,33,168,0.5); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔍</div>
        <h1>Enlace no encontrado</h1>
        <p>Este enlace no es válido o ha expirado. Puedes descargar JW Extras para acceder a todas las funciones.</p>
        <a href="/" class="btn">← Ir al inicio</a>
    </div>
</body>
</html>
