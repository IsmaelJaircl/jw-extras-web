<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio JW - Publicación</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a2e 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 30px;
            text-align: center;
            max-width: 380px;
            width: 85%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6b21a8, #4c1d95);
            border-radius: 24px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            box-shadow: 0 15px 30px rgba(107, 33, 168, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .reference {
            font-size: 22px;
            color: #d8b4fe;
            margin: 16px 0 24px;
            font-weight: 600;
            background: linear-gradient(to right, #e9d5ff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a1a1aa;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .btn {
            display: inline-block;
            background: #ffffff;
            color: #121212;
            padding: 16px 36px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 30px rgba(255,255,255,0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">📚</div>
        <h1>Servicio JW</h1>
        <div class="reference" id="refText">Cargando...</div>
        <p>Parece que aún no tienes instalada la aplicación, o abriste el enlace en el navegador en lugar de hacerlo desde la app.</p>
        <a href="#" class="btn" onclick="openApp()">Abrir en la App</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pub = urlParams.get('pub') || 'Publicación';
        const capitulo = urlParams.get('capitulo') || '';

        let refStr = pub;
        if (capitulo) refStr += ` — Capítulo ${capitulo}`;

        document.getElementById('refText').innerText = refStr;

        function openApp() {
            window.location.href = `serviciojw://publicacion${window.location.search}`;
        }

        setTimeout(openApp, 500);
    </script>
</body>
</html>
